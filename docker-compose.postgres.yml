services:
  postgres:
    image: postgres:16
    container_name: golanding-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: golanding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - golanding_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d golanding"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  golanding_postgres_data:
